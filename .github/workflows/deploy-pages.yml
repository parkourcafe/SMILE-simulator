name: Deploy site to GitHub Pages

# Publishes web/ to the gh-pages branch. Pages serves that branch (auto-enabled
# on first gh-pages push); the Pages REST API is not accessible to the workflow
# token on this repo, so the branch-based flow is the reliable one.
on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Push web/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          force_orphan: true
