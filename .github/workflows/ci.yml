name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web - form configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Verify Supabase form configuration
        run: python scripts/ci/verify_web_forms.py

  database:
    name: Database — migrations + invariants
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap Supabase-owned schemas
        run: psql --set ON_ERROR_STOP=1 --file scripts/ci/supabase_test_bootstrap.sql
      - name: Apply project migrations
        run: |
          for migration in supabase/migrations/*.sql; do
            psql --set ON_ERROR_STOP=1 --file "$migration"
          done
      - name: Verify consent, quota, and payment behavior
        run: psql --set ON_ERROR_STOP=1 --file scripts/ci/verify_atomic_quota.sql
      - name: Verify concurrent reservations
        run: bash scripts/ci/verify_quota_concurrency.sh

  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check . ../scripts
      - name: Ruff format check
        run: ruff format --check . ../scripts
      - name: Pytest
        run: pytest -q

  backend-image:
    name: Backend — production image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          load: true
          push: false
          tags: zubilook-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify runtime and bundled ML assets
        run: |
          docker run --detach --name zubilook-api --env PORT=8765 --publish 8765:8765 zubilook-api:ci
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8765/health >/dev/null; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              docker logs zubilook-api
              exit 1
            fi
            sleep 2
          done
          test "$(docker exec zubilook-api id --user)" = "10001"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8765/ready)" = "503"
          docker exec zubilook-api python -c "import mediapipe; from app.config import get_settings; assert get_settings().face_model_is_valid()"
      - name: Container logs
        if: always()
        run: |
          docker logs zubilook-api || true
          docker rm --force zubilook-api || true

  app:
    name: Flutter — analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
